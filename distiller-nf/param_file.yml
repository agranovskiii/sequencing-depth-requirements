
input:
    raw_reads_paths:

        SRR1658708_100000000_sample1:
            lane1:
                - /SRR*******_sample1_1.fastq.gz
                - /SRR*******_sample1_2.fastq.gz

    truncate_fastq_reads: 0

    genome:
        assembly_name: 'hg38'
        bwa_index_wildcard_path: 'hg38.fa.*'
        chrom_sizes_path:         'hg38.chrom.sizes'

do_fastqc: False

map:
    chunksize: 0
    mapping_options: ''
    trim_options: ''
    use_custom_split: true

parse:
    make_pairsam: False
    drop_seq: False
    drop_readid: True
    keep_unparsed_bams: False
    parsing_options: '--add-columns mapq --walks-policy mask'

dedup:
    max_mismatch_bp: 1
    dedup_options: ''

bin:
    resolutions:
        - 10000000
        - 5000000
        - 2500000
        - 1000000
        - 500000
        - 250000
        - 100000
        - 50000
        - 25000
        - 10000
        - 5000
        - 2000
        - 1000

    balance: true

    filters:
        mapq_30: '(mapq1>=30) and (mapq2>=30)'

output:
    dirs:
        processed_fastqs: 'SRR*******/processed_fastqs/'
        mapped_parsed_sorted_chunks: 'SRR*******/mapped_parsed_sorted_chunks'
        fastqc: 'SRR*******/fastqc/'
        pairs_library: 'SRR*******/pairs_library'
        coolers_library: 'SRR*******/coolers_library/'
        coolers_library_group: 'SRR*******/coolers_library_group/'
        stats_library_group: 'SRR*******/stats_library_group/'
